@if(pokemon(); as p){
  <div class="detail-container">

    <a routerLink="/" class="back-button">← Volver</a>

    <div class="card">

      <app-pokemon-images
        [sprites]="p.sprites"
        [name]="p.name">
      </app-pokemon-images>

      <app-pokemon-types
        [types]="p.types">
      </app-pokemon-types>

      <app-pokemon-navigation [pokemonId]="p.id">
        <h1>{{ p.name | titlecase }}</h1>
      </app-pokemon-navigation>

      <app-pokemon-sound
        [cries]="p.cries">
      </app-pokemon-sound>

      <div class="detail-grid">

        <app-pokemon-moves
          [moves]="p.moves">
        </app-pokemon-moves>

        <div class="sidebar">

          <div class="left-column">
            <app-pokemon-info
              [pokemon]="p">
            </app-pokemon-info>
          </div>

          <div class="right-column">
            <app-pokemon-stats
              [stats]="p.stats">
            </app-pokemon-stats>

            <app-pokemon-forms
              [sprites]="p.sprites">
            </app-pokemon-forms>
          </div>

        </div>

      </div>

    </div>

  </div>
}
@else{
  <p class="loading">Cargando Pokémon...</p>
}
